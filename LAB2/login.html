<!DOCTYPE html>
<!-- login.html -->

<html>
    <head>
        <meta charset="UTF-8">
        <title>Movie Site - Login</title>
        <link rel="stylesheet" type="text/css" href="main.css">
    </head>
    <body>

        <!-- Page Header -->
        <header class="page-header">
            <h1>Welcome to INTERNET-PROGRAMMING MOVIE SITE</h1>
        </header>

        <!-- Navigation -->
        <nav class="nav-links">
            <a href="login.html">로그인</a>
            |
            <a href="signup.html">회원가입</a>
        </nav>

        <!-- Login Form -->
        <form method="GET" action="#">
            <table class="form-table">
                <tbody>

                    <!-- 아이디 -->
                    <tr>
                        <td><label for="userid">아이디 :</label></td>
                        <td><input type="text" id="userid" name="userid"
                                   placeholder="아이디 입력"
                                   autofocus required /></td>
                    </tr>

                    <!-- 비밀번호 -->
                    <tr>
                        <td><label for="password">비밀번호 :</label></td>
                        <td><input type="password" id="password" name="password"
                                    placeholder="비밀번호 입력"
                                   required /></td>
                    </tr>

                    <!-- 버튼 -->
                    <tr>
                        <td colspan="2" class="btn-td">
                            <input type="submit" value="Login" class="btn-signup" />
                            <input type="reset" value="Cancel" class="btn-cancel" />
                        </td>
                    </tr>
                </tbody>
            </table>
        </form>

    </body>
</html>
